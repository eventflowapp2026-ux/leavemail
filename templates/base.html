<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4F46E5">
    <title>LeaveMail - {% block title %}Smart Leave Assistant{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo/logo.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link id="themeStylesheet" rel="stylesheet" href="{{ url_for('static', filename='css/themes/default.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <!-- Header with Logo -->
        <div class="app-header">
            <div class="logo-container">
                <img src="{{ url_for('static', filename='logo/logo.png') }}" alt="LeaveMail Logo" class="app-logo">
                <div class="logo-text">
                    <span class="logo-title">LeaveMail</span>
                    <span class="logo-tagline">Smart Leave Assistant</span>
                </div>
            </div>
        </div>
        
        <nav class="bottom-nav">
            <a href="/" class="nav-item {% if request.endpoint == 'index' %}active{% endif %}" data-nav="home">
                <span class="nav-icon">✉️</span>
                <span class="nav-label">Send</span>
            </a>
            <a href="/settings" class="nav-item {% if request.endpoint == 'settings' %}active{% endif %}" data-nav="settings">
                <span class="nav-icon">⚙️</span>
                <span class="nav-label">Settings</span>
            </a>
            <a href="/history" class="nav-item {% if request.endpoint == 'history' %}active{% endif %}" data-nav="history">
                <span class="nav-icon">📋</span>
                <span class="nav-label">History</span>
            </a>
        </nav>
        
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
        
        <!-- Footer -->
        <footer class="app-footer">
            <p class="powered-by">Powered by <span class="eventflow">EventFlow</span></p>
        </footer>
    </div>
    
    <div id="toast" class="toast"></div>
    
    <!-- Security Modal -->
    <div id="securityModal" class="modal" style="display: none;">
        <div class="modal-content security-modal-content" id="securityModalContent">
            <!-- Dynamic content -->
        </div>
    </div>
    
    <!-- Detail Modal for History -->
    <div id="detailModal" class="modal" style="display: none;">
        <div class="modal-content modal-large">
            <h3>📧 Leave Request Details</h3>
            <div id="detailContent"></div>
            <button class="btn btn-primary close-modal" style="margin-top: 16px;">Close</button>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
