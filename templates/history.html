{% extends "base.html" %}

{% block title %}Leave History{% endblock %}

{% block content %}
<div class="page-header">
    <h1>📋 Leave History</h1>
    <p class="subtitle">Previously sent requests</p>
    <button id="clearHistoryBtn" class="btn btn-small btn-secondary">Clear All</button>
</div>

<div id="historyList" class="history-list">
    <div class="empty-state" id="emptyState">
        <span class="empty-icon">📭</span>
        <p>No leave requests yet</p>
        <small>Your sent requests will appear here</small>
    </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="modal" style="display: none;">
    <div class="modal-content modal-large">
        <h3>📧 Leave Request Details</h3>
        <div id="detailContent"></div>
        <button class="btn btn-primary close-modal">Close</button>
    </div>
</div>
{% endblock %}
