services:
  - type: web
    name: leavemail
    runtime: python
    repo: https://github.com/eventflowapp2026-ux/leavemail
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
